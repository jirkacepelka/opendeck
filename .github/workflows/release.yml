name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Desktop (Electron) ────────────────────────────────────────────────────
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: desktop

      - name: Build Electron app
        run: npm run build:${{ matrix.platform }}
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # electron-builder --publish onTagOrDraft generuje latest.yml a nahraje vše na GitHub Release

      - name: Upload artifact (Windows)
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-win
          path: |
            desktop/dist/*.exe
            desktop/dist/latest.yml

      - name: Upload artifact (macOS)
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-mac
          path: |
            desktop/dist/*.dmg
            desktop/dist/latest-mac.yml

      - name: Upload artifact (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: |
            desktop/dist/*.AppImage
            desktop/dist/latest-linux.yml

  # ── Android (EAS) ─────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    continue-on-error: true  # Nevyžaduje EXPO_TOKEN pro desktop release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        run: npm install
        working-directory: android-app

      - name: Build APK
        run: eas build --platform android --profile preview --non-interactive
        working-directory: android-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download built APK
        run: |
          URL=$(eas build:list --platform android --limit 1 --json --non-interactive \
            | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['artifacts']['buildUrl'])")
          curl -L "$URL" -o OpenDeck.apk
        working-directory: android-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android-app/OpenDeck.apk

  # ── GitHub Release ────────────────────────────────────────────────────────
  create-release:
    needs: [build-desktop]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: OpenDeck ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          body: |
            ## OpenDeck ${{ steps.version.outputs.VERSION }}

            ### Instalace

            **Windows:** Stáhni `.exe` a spusť installer.
            **macOS:** Stáhni `.dmg` a přesuň do Applications.
            **Linux:** Stáhni `.AppImage`, přidej execute permission (`chmod +x`) a spusť.
            **Android:** Stáhni `.apk` a nainstaluj (v Nastavení povol instalaci z neznámých zdrojů).

            > Android APK vyžaduje nastavený `EXPO_TOKEN` secret — pokud chybí, přidej ho v Settings → Secrets.
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
